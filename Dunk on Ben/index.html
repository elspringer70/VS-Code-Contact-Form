<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunk on Ben</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
        }
        h1 {
            font-size: 5rem;
            color: #222;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }
        h1:hover {
            transform: scale(1.05);
            color: #ff4500;
        }

        /* Overlay Styles */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Animation Styles */
        .court {
            width: 600px;
            height: 400px;
            border-bottom: 5px solid white;
            position: relative;
            overflow: hidden;
        }

        .hoop {
            position: absolute;
            right: 50px;
            bottom: 150px;
            width: 60px;
            height: 10px;
            background: red;
            border-radius: 5px;
        }

        .backboard {
            position: absolute;
            right: 45px;
            bottom: 150px;
            width: 5px;
            height: 80px;
            background: white;
        }

        .stick-figure {
            position: absolute;
            bottom: 0;
            text-align: center;
            font-weight: bold;
        }

        #ben {
            right: 70px;
            transform-origin: bottom;
            animation: ben-defend 3s infinite;
        }

        #elias {
            left: 50px;
            animation: dunk-action 3s infinite;
        }

        @keyframes dunk-action {
            0% { left: 50px; bottom: 0; }
            30% { left: 200px; bottom: 0; }
            50% { left: 450px; bottom: 160px; } /* Jumping high */
            70% { left: 470px; bottom: 140px; } /* Slamming */
            90% { left: 470px; bottom: 0; }     /* Landing */
            100% { left: 50px; bottom: 0; }
        }

        @keyframes ben-defend {
            0%, 40% { transform: translateY(0) rotate(0deg); right: 70px; }
            50% { transform: translateY(-80px) rotate(-10deg); right: 80px; } /* Jump to block */
            70% { transform: translateY(-40px) rotate(90deg); right: 20px; }  /* Getting dunked on/knocked back */
            85%, 95% { transform: translateY(0) rotate(90deg); right: 10px; } /* Flat on ground */
            100% { transform: translateY(0) rotate(0deg); right: 70px; }      /* Reset */
        }
    </style>
</head>
<body>
    <h1 onclick="showDunk()">Dunk on Ben</h1>

    <div id="overlay">
        <span class="close-btn" onclick="hideDunk()">&times;</span>
        <div class="court">
            <div class="backboard"></div>
            <div class="hoop"></div>
            
            <div id="ben" class="stick-figure">
                <div>O</div>
                <div>/|\</div>
                <div>/ \</div>
                <small>BEN</small>
            </div>

            <div id="elias" class="stick-figure">
                <div>O 🏀</div>
                <div>/|\</div>
                <div>/ \</div>
                <small>ELIAS</small>
            </div>
        </div>
        <h2>ELIAS DUNKS ON BEN!</h2>
    </div>

    <script>
        function showDunk() {
            document.getElementById('overlay').style.display = 'flex';
        }
        function hideDunk() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
